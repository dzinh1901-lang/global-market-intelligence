version: "3.9"

# ── Production / staging stack ────────────────────────────────────────────────
# Domain: auren-workspace.com (Hostinger VPS)
#   https://auren-workspace.com       → Next.js frontend
#   https://www.auren-workspace.com   → redirect → apex
#   https://api.auren-workspace.com   → FastAPI backend
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in a .env file or CI/CD secrets):
#   SECRET_KEY          — 32+ char random hex  (NEVER use the dev default)
#   ENCRYPTION_KEY      — Fernet key for field-level DB encryption
#   DATABASE_URL        — postgresql://user:pass@host:5432/dbname
#   OPENAI_API_KEY      — OpenAI API key
#   ANTHROPIC_API_KEY   — Anthropic API key
#   GEMINI_API_KEY      — Google Gemini API key
#   ALLOWED_ORIGINS     — https://auren-workspace.com,https://www.auren-workspace.com
#   NEXT_PUBLIC_API_URL — https://api.auren-workspace.com
#
# Generate SECRET_KEY:    python -c "import secrets; print(secrets.token_hex(32))"
# Generate ENCRYPTION_KEY: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-aip}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Not exposed on the host — only accessible within the compose network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aip}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    # Expose only to the reverse proxy — do not bind 0.0.0.0 directly
    expose:
      - "8000"
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-aip}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aip}}
      # Auth — MUST be set to a strong secret in production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      REQUIRE_AUTH: "true"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # Encryption — strongly recommended in production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      # AI APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY must be set}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      # CORS — restrict to your actual frontend domain(s)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set}
      # Error monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Outbound alert notifications
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_MIN_SEVERITY: ${ALERT_MIN_SEVERITY:-warning}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set}
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t -q"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────────────────
  # Initial certificate issuance (run once):
  #   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
  #     --webroot -w /var/www/certbot \
  #     -d auren-workspace.com -d www.auren-workspace.com -d api.auren-workspace.com \
  #     --email admin@auren-workspace.com --agree-tos --no-eff-email
  #
  # After obtaining certs, start nginx normally:
  #   docker compose -f docker-compose.prod.yml up -d nginx
  #
  # Automatic renewal runs every 12 hours inside this container.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew certificates daily; nginx reloads pick them up automatically
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --quiet --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
