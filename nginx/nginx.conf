# ── Nginx reverse proxy — auren-workspace.com ─────────────────────────────────
# Serves:
#   https://auren-workspace.com       → Next.js frontend (port 3000)
#   https://www.auren-workspace.com   → redirect → auren-workspace.com
#   https://api.auren-workspace.com   → FastAPI backend  (port 8000)
#
# TLS certificates are issued by Let's Encrypt via Certbot.
# Run the init helper first (see README — Hostinger VPS deployment):
#   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot \
#     -d auren-workspace.com -d www.auren-workspace.com -d api.auren-workspace.com \
#     --email admin@auren-workspace.com --agree-tos --no-eff-email

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name auren-workspace.com www.auren-workspace.com api.auren-workspace.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── www → apex redirect ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name www.auren-workspace.com;

        ssl_certificate     /etc/letsencrypt/live/auren-workspace.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auren-workspace.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        return 301 https://auren-workspace.com$request_uri;
    }

    # ── Frontend — auren-workspace.com ───────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name auren-workspace.com;

        ssl_certificate     /etc/letsencrypt/live/auren-workspace.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auren-workspace.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── Backend API — api.auren-workspace.com ─────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.auren-workspace.com;

        ssl_certificate     /etc/letsencrypt/live/auren-workspace.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auren-workspace.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

        # Rate-limit the API
        limit_req zone=api burst=20 nodelay;

        location / {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
